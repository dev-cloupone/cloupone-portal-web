name = "cloupone-portal-web"
main = "src/worker.ts"
compatibility_date = "2026-04-17"

[observability]
enabled = true

[assets]
directory = "./dist"
not_found_handling = "single-page-application"
binding = "ASSETS"

[[ratelimits]]
name = "RATE_LIMITER"
namespace_id = "1001"

[ratelimits.simple]
limit = 200
period = 60

# --- Dev environment ---

[env.dev]
name = "cloupone-portal-web-dev"

[env.dev.assets]
directory = "./dist"
not_found_handling = "single-page-application"
binding = "ASSETS"

[[env.dev.ratelimits]]
name = "RATE_LIMITER"
namespace_id = "1002"

[env.dev.ratelimits.simple]
limit = 200
period = 60
